<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You're all set · Solvo Global</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--text-primary);
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background:
      radial-gradient(880px 380px at 88% -6%, rgba(238,118,35,0.07), transparent 70%),
      radial-gradient(900px 520px at 8% 0%, rgba(0,138,171,0.10), transparent 65%),
      linear-gradient(180deg, #EEF6F8 0%, #FAFAFB 38%);
  }

  /* ============================ DEMO BANNER ============================ */
  .demo-banner {
    background: #111827;
    color: #fff;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--font-heading);
    font-size: 11px;
    letter-spacing: 0.04em;
    gap: 12px;
  }
  .demo-banner .tag {
    background: var(--color-primary);
    color: #fff;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .demo-banner a {
    color: #fff;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 4px;
    font-size: 11px;
  }
  .demo-banner a:hover { background: rgba(255,255,255,0.08); }

  /* ============================ LAYOUT ============================ */
  .shell {
    max-width: 520px;
    margin: 0 auto;
    padding: clamp(36px, 7vh, 80px) 20px clamp(40px, 6vh, 72px);
    text-align: center;
  }

  /* ============================ SUCCESS HEAD ============================ */
  .check {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid var(--color-primary);
    background: var(--color-primary-50);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 22px;
    animation: pop 520ms cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    animation-delay: 90ms;
  }
  .check svg { width: 42px; height: 42px; }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-family: var(--font-heading);
    font-size: clamp(28px, 4.5vw, 38px);
    font-weight: 700;
    color: var(--color-secondary);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .lead {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: clamp(24px, 4vh, 36px);
  }

  /* ============================ MEETING CARD ============================ */
  .card {
    background: #fff;
    border-radius: 18px;
    border: 1px solid var(--border-default);
    box-shadow: 0 28px 64px -34px rgba(17,24,39,0.30), 0 4px 14px -6px rgba(17,24,39,0.06);
    padding: clamp(22px, 3vw, 30px);
    text-align: left;
  }
  .card-title {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 700;
    color: var(--color-primary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
    white-space: nowrap;
  }
  .card-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .rows { margin-top: 16px; }
  .row {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 14px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--color-gray-100);
  }
  .row:last-child { border-bottom: 0; }
  .row-icon {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    background: var(--color-primary-50);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .row-icon svg { width: 22px; height: 22px; }
  .row-label {
    font-family: var(--font-heading);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .row-value {
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .row-value .muted {
    display: block;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .ics-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    margin-top: 22px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 0;
    background: var(--color-secondary);
    color: #fff;
    font-family: var(--font-heading);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 12px 24px -12px rgba(0,138,171,0.6);
    transition: transform var(--transition-fast), background var(--transition-fast);
  }
  .ics-btn:hover {
    background: var(--color-secondary-700);
    transform: translateY(-1px);
  }
  .ics-btn svg { width: 17px; height: 17px; }

  .rebook {
    display: inline-block;
    margin-top: 18px;
    color: var(--color-secondary);
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
  }
  .rebook:hover { text-decoration: underline; }

  /* ============================ EMPTY STATE ============================ */
  .empty .check {
    border-color: var(--border-strong);
    background: var(--color-gray-100);
  }
  .empty h1 { color: var(--text-primary); }

  @media (max-width: 460px) {
    .demo-banner { padding: 7px 14px; }
    .shell { padding: 32px 16px 44px; }
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="demo-banner">
  <span><span class="tag">Demo</span> Confirmation page &mdash; Email Cold Outreach POC</span>
  <a href="landing-scheduling-v2.html">&larr; Back to scheduling</a>
</div>

<div class="shell" id="shell">
  <!-- Rendered by script: confirmed state or empty state -->
</div>

<script>
(function () {
  "use strict";

  var ICON = {
    checkBig:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#EE7623" stroke-width="3" ' +
      'stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 L10 17.5 L19 6.5"/></svg>',
    date:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#EE7623" stroke-width="2" ' +
      'stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" ' +
      'height="16.5" rx="2.5"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2" ' +
      'x2="8" y2="6.5"/><line x1="16" y1="2" x2="16" y2="6.5"/><path d="M8 14 L11 16.5 L16 12"/></svg>',
    time:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#EE7623" stroke-width="2" ' +
      'stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/>' +
      '<path d="M12 7.5 V12 L15 14.5"/></svg>',
    format:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#EE7623" stroke-width="2" ' +
      'stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6.5" width="13" ' +
      'height="11" rx="2.5"/><path d="M15.5 10 L21.5 7 V17 L15.5 14"/></svg>',
    download:
      '<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.2" ' +
      'stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 V14.5"/>' +
      '<path d="M7.5 10.5 L12 15 L16.5 10.5"/><path d="M4.5 19.5 H19.5"/></svg>'
  };

  /* ===== Read the meeting (HU-LAG-2.1-FE hands off via URL params / sessionStorage) ===== */
  function readMeeting() {
    var q = new URLSearchParams(window.location.search);
    var start = q.get("start"), end = q.get("end"), tz = q.get("tz");
    if (!start || !end) {
      try {
        var s = JSON.parse(sessionStorage.getItem("lag_meeting") || "null");
        if (s) { start = s.start; end = s.end; tz = tz || s.tz; }
      } catch (e) {}
    }
    if (!start || !end) return null;
    var sd = new Date(start), ed = new Date(end);
    if (isNaN(sd) || isNaN(ed)) return null;
    return { start: sd, end: ed, tz: tz || "America/New_York" };
  }

  /* ===== Formatting ===== */
  function fmtDate(d, tz) {
    return d.toLocaleDateString("en-US",
      { weekday: "long", year: "numeric", month: "long", day: "numeric", timeZone: tz });
  }
  function fmtTime(d, tz) {
    return d.toLocaleTimeString("en-US",
      { hour: "numeric", minute: "2-digit", timeZone: tz });
  }
  function tzAbbr(d, tz) {
    try {
      var parts = new Intl.DateTimeFormat("en-US",
        { timeZone: tz, timeZoneName: "short" }).formatToParts(d);
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].type === "timeZoneName") return parts[i].value;
      }
    } catch (e) {}
    return tz;
  }

  /* ===== .ics (RFC 5545 minimum) ===== */
  function icsStamp(d) {
    return d.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
  }
  function buildIcs(m) {
    var uid = "lag-" + m.start.getTime() + "@solvoglobal.net";
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Solvo Global//Scheduling POC//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + uid,
      "DTSTAMP:" + icsStamp(new Date()),
      "DTSTART:" + icsStamp(m.start),
      "DTEND:" + icsStamp(m.end),
      "SUMMARY:Solvo Global — Initial call",
      "DESCRIPTION:Your 25-minute meeting with Solvo Global. The video call link " +
        "was sent to your email.",
      "STATUS:CONFIRMED",
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\r\n");
  }
  function downloadIcs(m) {
    var blob = new Blob([buildIcs(m)], { type: "text/calendar;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "solvo-meeting.ics";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  }

  /* ===== Render ===== */
  var shell = document.getElementById("shell");
  var meeting = readMeeting();

  if (!meeting) {
    document.body.classList.add("empty");
    shell.innerHTML =
      '<div class="check">' + ICON.checkBig.replace(/#EE7623/g, "#9CA3AF") + '</div>' +
      '<h1>No meeting to show</h1>' +
      '<p class="lead">We couldn\'t find a confirmed meeting. Start from the scheduling ' +
      'page to book a time.</p>' +
      '<a class="rebook" href="landing-scheduling-v2.html">Go to scheduling &rarr;</a>';
    return;
  }

  var abbr = tzAbbr(meeting.start, meeting.tz);
  shell.innerHTML =
    '<div class="check">' + ICON.checkBig + '</div>' +
    '<h1>You\'re all set!</h1>' +
    '<p class="lead">Your meeting has been confirmed.</p>' +
    '<div class="card">' +
      '<div class="card-title">Meeting details</div>' +
      '<div class="rows">' +
        '<div class="row">' +
          '<div class="row-icon">' + ICON.date + '</div>' +
          '<div><div class="row-label">Date</div>' +
          '<div class="row-value">' + fmtDate(meeting.start, meeting.tz) + '</div></div>' +
        '</div>' +
        '<div class="row">' +
          '<div class="row-icon">' + ICON.time + '</div>' +
          '<div><div class="row-label">Time</div>' +
          '<div class="row-value">' +
            fmtTime(meeting.start, meeting.tz) + ' – ' +
            fmtTime(meeting.end, meeting.tz) +
            ' <span style="color:var(--text-muted);font-weight:400;">' + abbr + '</span>' +
          '</div></div>' +
        '</div>' +
        '<div class="row">' +
          '<div class="row-icon">' + ICON.format + '</div>' +
          '<div><div class="row-label">Format</div>' +
          '<div class="row-value">Video call' +
            '<span class="muted">Join link sent to your email</span></div></div>' +
        '</div>' +
      '</div>' +
      '<button type="button" class="ics-btn" id="ics-btn">' +
        ICON.download + 'Add to calendar (.ics)</button>' +
    '</div>' +
    '<a class="rebook" href="landing-scheduling-v2.html">Book a different time</a>';

  document.getElementById("ics-btn").addEventListener("click", function () {
    downloadIcs(meeting);
  });
})();
</script>

</body>
</html>
